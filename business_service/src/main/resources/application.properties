server.port=8082
spring.application.name=business-service

# Base de donnees de l'auth-service (principe microservice)
spring.datasource.url=jdbc:postgresql://localhost:5432/business_db
spring.datasource.username=postgres
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# JWT doit etre identique au auth-service pour valider les tokens
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# CORS
cors.allowed-origins=http://localhost:4200,https://webresto-frontend.onrender.com

logging.level.com.restaurant=DEBUG
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration