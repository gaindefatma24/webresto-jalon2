<div class="profil-wrapper">

    <!-- Carte profil -->
    <mat-card class="profil-card">
        <mat-card-header>
            <div class="avatar">{{ initiales }}</div>
            <div class="header-info">
                <mat-card-title>{{ utilisateur?.prenom }} {{ utilisateur?.nom }}</mat-card-title>
                <mat-card-subtitle>{{ utilisateur?.email }}</mat-card-subtitle>
                <span class="role-badge">{{ roleLabel }}</span>
            </div>
        </mat-card-header>
    </mat-card>

    <!-- Formulaire infos -->
    <mat-card class="form-card">
        <mat-card-header>
            <mat-card-title>Mes informations</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="infoForm" (ngSubmit)="sauvegarderInfos()">

                <div class="row-2">
                    <mat-form-field appearance="outline">
                        <mat-label>Prénom</mat-label>
                        <input matInput formControlName="prenom">
                        <mat-error *ngIf="infoForm.get('prenom')?.hasError('required')">Requis</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline">
                        <mat-label>Nom</mat-label>
                        <input matInput formControlName="nom">
                        <mat-error *ngIf="infoForm.get('nom')?.hasError('required')">Requis</mat-error>
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Courriel</mat-label>
                    <input matInput formControlName="email">
                    <mat-icon matSuffix>lock</mat-icon>
                    <mat-hint>L'email ne peut pas être modifié</mat-hint>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Téléphone</mat-label>
                    <input matInput formControlName="telephone" placeholder="514-555-0000">
                    <mat-icon matSuffix>phone</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Adresse</mat-label>
                    <input matInput formControlName="adresse" placeholder="123 Rue Exemple, Montréal">
                    <mat-icon matSuffix>home</mat-icon>
                </mat-form-field>

                <div *ngIf="erreur" class="error-msg">{{ erreur }}</div>

                <div class="actions">
                    <button mat-raised-button color="primary" type="submit"
                            [disabled]="infoForm.pristine || infoForm.invalid || chargement">
                        <mat-icon>save</mat-icon>
                        {{ chargement ? 'Sauvegarde…' : 'Sauvegarder' }}
                    </button>
                    <button mat-stroked-button type="button" (click)="annulerInfos()"
                            [disabled]="infoForm.pristine">
                        Annuler
                    </button>
                </div>

            </form>
        </mat-card-content>
    </mat-card>

</div>
