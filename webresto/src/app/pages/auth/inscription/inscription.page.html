<div class="auth-wrapper">
  <mat-card class="auth-carte">
    <mat-card-header>
      <mat-card-title>Inscription</mat-card-title>
      <mat-card-subtitle>Créez votre compte WebResto</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="formulaire" (ngSubmit)="soumettre()">

        <div class="form-rangee">
          <mat-form-field appearance="outline">
            <mat-label>Nom</mat-label>
            <input matInput formControlName="nom" placeholder="Tremblay">
            <mat-error *ngIf="formulaire.get('nom')?.hasError('required')">Requis</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Prénom</mat-label>
            <input matInput formControlName="prenom" placeholder="Jean">
            <mat-error *ngIf="formulaire.get('prenom')?.hasError('required')">Requis</mat-error>
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline" class="pleine-largeur">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="votre@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="formulaire.get('email')?.hasError('required')">Email requis</mat-error>
          <mat-error *ngIf="formulaire.get('email')?.hasError('email')">Email invalide</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="pleine-largeur">
          <mat-label>Mot de passe</mat-label>
          <input matInput [type]="afficherMdp ? 'text' : 'password'"
                 formControlName="motDePasse" placeholder="6 caractères minimum">
          <button mat-icon-button matSuffix type="button" (click)="afficherMdp = !afficherMdp">
            <mat-icon>{{ afficherMdp ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="formulaire.get('motDePasse')?.hasError('required')">Requis</mat-error>
          <mat-error *ngIf="formulaire.get('motDePasse')?.hasError('minlength')">6 caractères minimum</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="pleine-largeur">
          <mat-label>Téléphone</mat-label>
          <input matInput type="tel" formControlName="telephone" placeholder="514-555-0000">
          <mat-icon matSuffix>phone</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="pleine-largeur">
          <mat-label>Adresse</mat-label>
          <input matInput formControlName="adresse" placeholder="123 Rue Example, Montréal">
          <mat-icon matSuffix>location_on</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="pleine-largeur">
          <mat-label>Rôle</mat-label>
          <mat-select formControlName="role">
            <mat-option value="CLIENT">👤 Client</mat-option>
            <mat-option value="RESTAURATEUR">🍽️ Restaurateur</mat-option>
            <mat-option value="LIVREUR">🚗 Livreur</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="banniere-erreur" *ngIf="erreur">
          <mat-icon>error_outline</mat-icon> {{ erreur }}
        </div>

        <button mat-flat-button color="primary" type="submit"
                class="pleine-largeur btn-soumettre" [disabled]="chargement">
          {{ chargement ? 'Création...' : "S'inscrire" }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="lien-switch">
        Déjà un compte ?
        <a mat-button color="primary" routerLink="/connexion">Connectez-vous</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
